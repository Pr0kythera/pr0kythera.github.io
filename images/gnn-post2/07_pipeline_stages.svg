<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 970 400" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    .surface { fill: #fcfcfb; }
    .ink-primary { fill: #0b0b0b; }
    .ink-secondary { fill: #52514e; }
    .ink-muted { fill: #898781; }
    .stage-box { fill: #fcfcfb; stroke: #c3c2b7; stroke-width: 1.5; }
    .stage-title { font-size: 15px; font-weight: 700; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10.5px; }
    .cap { font-size: 11.5px; }
    .arrow { stroke: #0b0b0b; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0b0b0b"/>
    </marker>
  </defs>

  <rect class="surface" x="0" y="0" width="970" height="400"/>

  <text x="30" y="32" class="ink-primary" font-size="19" font-weight="700">Parse, correlate, label: the pipeline that turns logs into a graph</text>
  <text x="30" y="52" class="ink-secondary" font-size="12.5">One fixed procedure, run identically for all 20 scenarios.</text>

  <!-- 5 stage boxes -->
  <!-- Box 1: Parsers -->
  <g transform="translate(20,80)">
    <rect class="stage-box" x="0" y="0" width="176" height="190" rx="8"/>
    <text class="stage-title ink-primary" x="88" y="26" text-anchor="middle">Parsers</text>
    <text class="mono ink-muted" x="88" y="48" text-anchor="middle">ecar.py windows.py</text>
    <text class="mono ink-muted" x="88" y="62" text-anchor="middle">sysmon.py zeek.py asa.py</text>
    <line x1="16" y1="76" x2="160" y2="76" stroke="#e1e0d9" stroke-width="1"/>
    <text class="ink-secondary cap" x="88" y="96" text-anchor="middle">Raw eCAR / Windows /</text>
    <text class="ink-secondary cap" x="88" y="112" text-anchor="middle">Sysmon / Zeek / ASA logs</text>
    <text class="ink-secondary cap" x="88" y="128" text-anchor="middle">-&gt; NormalisedEvent lists</text>
    <text class="ink-muted cap" x="88" y="168" text-anchor="middle" font-size="10.5">windows.py folds ALL</text>
    <text class="ink-muted cap" x="88" y="182" text-anchor="middle" font-size="10.5">EventData generically</text>
  </g>

  <path class="arrow" d="M198,175 L216,175"/>

  <!-- Box 2: Correlator -->
  <g transform="translate(220,80)">
    <rect class="stage-box" x="0" y="0" width="176" height="190" rx="8"/>
    <text class="stage-title ink-primary" x="88" y="26" text-anchor="middle">Correlator</text>
    <text class="mono ink-muted" x="88" y="48" text-anchor="middle">correlator_v14.py</text>
    <line x1="16" y1="60" x2="160" y2="60" stroke="#e1e0d9" stroke-width="1"/>
    <text class="ink-secondary cap" x="88" y="80" text-anchor="middle">Typed graph: nodes keyed</text>
    <text class="ink-secondary cap" x="88" y="96" text-anchor="middle">by objectID, edges</text>
    <text class="ink-secondary cap" x="88" y="112" text-anchor="middle">actor -&gt; object</text>
    <text class="ink-muted cap" x="88" y="136" text-anchor="middle" font-size="10.5">Merges: session&lt;-&gt;process,</text>
    <text class="ink-muted cap" x="88" y="150" text-anchor="middle" font-size="10.5">socket&lt;-&gt;session, Zeek</text>
    <text class="ink-muted cap" x="88" y="164" text-anchor="middle" font-size="10.5">5-tuple onto sockets</text>
    <text class="ink-muted cap" x="88" y="182" text-anchor="middle" font-size="10.5">synthesizes nodes if silent</text>
  </g>

  <path class="arrow" d="M398,175 L416,175"/>

  <!-- Box 3: Labeler -->
  <g transform="translate(420,80)">
    <rect class="stage-box" x="0" y="0" width="176" height="190" rx="8"/>
    <text class="stage-title ink-primary" x="88" y="26" text-anchor="middle">Labeler</text>
    <text class="mono ink-muted" x="88" y="48" text-anchor="middle">labeler_v9.py</text>
    <line x1="16" y1="60" x2="160" y2="60" stroke="#e1e0d9" stroke-width="1"/>
    <text class="ink-secondary cap" x="88" y="80" text-anchor="middle">Reads GROUND_TRUTH.json,</text>
    <text class="ink-secondary cap" x="88" y="96" text-anchor="middle">anchors malice by</text>
    <text class="ink-secondary cap" x="88" y="112" text-anchor="middle">identifier</text>
    <text x="88" y="140" text-anchor="middle" font-weight="700" font-size="11" fill="#d03b3b">never on structure --</text>
    <text x="88" y="154" text-anchor="middle" font-weight="700" font-size="11" fill="#d03b3b">a structural check can</text>
    <text x="88" y="168" text-anchor="middle" font-weight="700" font-size="11" fill="#d03b3b">pass on the wrong entity</text>
  </g>

  <path class="arrow" d="M598,175 L616,175"/>

  <!-- Box 4: Features -->
  <g transform="translate(620,80)">
    <rect class="stage-box" x="0" y="0" width="164" height="190" rx="8"/>
    <text class="stage-title ink-primary" x="82" y="26" text-anchor="middle">Features</text>
    <text class="mono ink-muted" x="82" y="48" text-anchor="middle" font-size="9.5">feature_config.py +</text>
    <text class="mono ink-muted" x="82" y="61" text-anchor="middle" font-size="9.5">node/edge extractors</text>
    <line x1="16" y1="72" x2="148" y2="72" stroke="#e1e0d9" stroke-width="1"/>
    <text class="ink-secondary cap" x="82" y="92" text-anchor="middle">Fixed-width vectors,</text>
    <text class="ink-secondary cap" x="82" y="108" text-anchor="middle">one shared schema</text>
    <text class="ink-secondary cap" x="82" y="124" text-anchor="middle">across all 20 scenarios</text>
    <text class="ink-muted cap" x="82" y="148" text-anchor="middle" font-size="10.5">section 3.2</text>
  </g>

  <path class="arrow" d="M786,175 L802,175"/>

  <!-- Box 5: Train -->
  <g transform="translate(806,80)">
    <rect class="stage-box" x="0" y="0" width="144" height="190" rx="8"/>
    <text class="stage-title ink-primary" x="72" y="26" text-anchor="middle">Train</text>
    <text class="mono ink-muted" x="72" y="48" text-anchor="middle" font-size="9.5">HGT / three-scope</text>
    <line x1="16" y1="60" x2="128" y2="60" stroke="#e1e0d9" stroke-width="1"/>
    <text class="ink-secondary cap" x="72" y="80" text-anchor="middle">M1 control vs.</text>
    <text class="ink-secondary cap" x="72" y="96" text-anchor="middle">M2 treatment</text>
    <text class="ink-muted cap" x="72" y="120" text-anchor="middle" font-size="10.5">section 3.3-3.4</text>
  </g>

  <text x="30" y="330" class="ink-secondary cap">Every validator re-reads the written artifact from disk and asserts malicious counts against ground truth --</text>
  <text x="30" y="346" class="ink-secondary cap">"fail loud" means a wrong assertion is a possible outcome, never smoothed into a pass.</text>

  <text x="30" y="380" class="ink-secondary cap">Figure 7. The five pipeline stages -- each new capability (WMI transport, ASA firewall parsing) was added additively, verified byte-identical when unused.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    .surface { fill: #fcfcfb; }
    .ink-primary { fill: #0b0b0b; }
    .ink-secondary { fill: #52514e; }
    .ink-muted { fill: #898781; }
    .mal-edge { stroke: #d03b3b; stroke-width: 2.5; }
    .mal-node { fill: #d03b3b; stroke: #fcfcfb; stroke-width: 2; }
    .benign-node { fill: #d8d6cd; stroke: #fcfcfb; stroke-width: 2; }
    .benign-edge { stroke: #c3c2b7; stroke-width: 1.5; stroke-dasharray: 3 3; }
    .panel-title { font-size: 15px; font-weight: 700; }
    .cap { font-size: 11.5px; }
  </style>

  <rect class="surface" x="0" y="0" width="900" height="500"/>

  <text x="30" y="32" class="ink-primary" font-size="19" font-weight="700">Why seed-and-expand sometimes fails: is the malicious footprint one piece?</text>
  <text x="30" y="52" class="ink-secondary" font-size="12.5">EvidenceForge mints a fresh session/process identity per anchoring event --</text>
  <text x="30" y="68" class="ink-secondary" font-size="12.5">so "one attacker" can be several disconnected graph components.</text>

  <!-- legend -->
  <circle cx="30" cy="92" r="6" fill="#d03b3b"/>
  <text x="42" y="96" class="ink-secondary" font-size="12.5">malicious node</text>
  <circle cx="180" cy="92" r="6" fill="#d8d6cd"/>
  <text x="192" y="96" class="ink-secondary" font-size="12.5">benign neighbor</text>

  <!-- PANEL A: Regime A -->
  <g transform="translate(50,132)">
    <text class="panel-title ink-primary" x="0" y="0">Regime A -- one connected component</text>
    <text class="ink-muted cap" x="0" y="18">8 of 16 attack scenarios (A1, A2, A5, A6, A9, A10, A11, F2)</text>
    <g transform="translate(30,50)">
      <line class="mal-edge" x1="40" y1="30" x2="110" y2="10"/>
      <line class="mal-edge" x1="110" y1="10" x2="170" y2="45"/>
      <line class="mal-edge" x1="170" y1="45" x2="130" y2="105"/>
      <line class="mal-edge" x1="130" y1="105" x2="60" y2="100"/>
      <line class="mal-edge" x1="60" y1="100" x2="40" y2="30"/>
      <circle class="mal-node" cx="40" cy="30" r="8"/>
      <circle class="mal-node" cx="110" cy="10" r="8"/>
      <circle class="mal-node" cx="170" cy="45" r="8"/>
      <circle class="mal-node" cx="130" cy="105" r="8"/>
      <circle class="mal-node" cx="60" cy="100" r="8"/>
    </g>
    <text class="ink-secondary cap" x="0" y="200">Single seed BFS from any one alert reaches every</text>
    <text class="ink-secondary cap" x="0" y="215">malicious node -- 100% recovery, K=1-3.</text>
  </g>

  <!-- PANEL B: Regime B / A4 -->
  <g transform="translate(490,132)">
    <text class="panel-title ink-primary" x="0" y="0">Regime B -- A4's 5 disjoint clusters</text>
    <text class="ink-muted cap" x="0" y="18">7 malicious nodes, 5 separate components (schematic)</text>

    <g transform="translate(0,40)">
      <!-- cluster 1: DCSync process + krbtgt -->
      <line class="mal-edge" x1="20" y1="30" x2="70" y2="30"/>
      <circle class="mal-node" cx="20" cy="30" r="7"/>
      <circle class="mal-node" cx="70" cy="30" r="7"/>
      <text class="ink-muted" font-size="9.5" x="45" y="15" text-anchor="middle">DCSync -&gt; krbtgt</text>

      <!-- cluster 2: session/process hub, with a benign dead-end -->
      <line class="mal-edge" x1="160" y1="20" x2="200" y2="45"/>
      <line class="benign-edge" x1="160" y1="20" x2="160" y2="70"/>
      <circle class="mal-node" cx="160" cy="20" r="7"/>
      <circle class="mal-node" cx="200" cy="45" r="7"/>
      <circle class="benign-node" cx="160" cy="70" r="6"/>
      <text class="ink-muted" font-size="9.5" x="180" y="10" text-anchor="middle">session hub</text>

      <!-- cluster 3: second session, isolated -->
      <circle class="mal-node" cx="300" cy="30" r="7"/>
      <line class="benign-edge" x1="300" y1="30" x2="335" y2="60"/>
      <circle class="benign-node" cx="335" cy="60" r="6"/>
      <text class="ink-muted" font-size="9.5" x="300" y="14" text-anchor="middle">2nd session</text>

      <!-- cluster 4: isolated process -->
      <circle class="mal-node" cx="60" cy="115" r="7"/>
      <line class="benign-edge" x1="60" y1="115" x2="30" y2="140"/>
      <circle class="benign-node" cx="30" cy="140" r="6"/>
      <text class="ink-muted" font-size="9.5" x="60" y="99" text-anchor="middle">isolated process</text>

      <!-- cluster 5: isolated file -->
      <circle class="mal-node" cx="220" cy="120" r="7"/>
      <line class="benign-edge" x1="220" y1="120" x2="255" y2="145"/>
      <circle class="benign-node" cx="255" cy="145" r="6"/>
      <text class="ink-muted" font-size="9.5" x="220" y="104" text-anchor="middle">isolated file</text>
    </g>

    <text class="ink-secondary cap" x="0" y="200">No single seed reaches all 5 islands -- a BFS from</text>
    <text class="ink-secondary cap" x="0" y="215">one true positive plateaus well short of 100%.</text>
  </g>

  <text x="30" y="462" class="ink-secondary cap">Figure 5. Whether "detect, then reconstruct" works is predictable from graph structure, not model confidence</text>
  <text x="30" y="478" class="ink-secondary cap">(section 3.8) -- the same identity-minting mechanism already known from D1's two independent attackers.</text>
</svg>
